# Path: /docker-compose.prod.yml
# Module: Production Compose Stack
# Depends on: Dockerfile
# Description: Production compose definition for the standalone Next.js app.

version: '3.9'
services:
  app:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
